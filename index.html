<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="stylesheet" href="./style.css">

</head>
<body class="min-h-screen max-w-md mx-auto font-geist shadow-lg">
        <div class="w-full mx-auto pt-32">
            <img src="./assets/Frame 2087325645.png">
        </div>

        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-md mx-auto rounded-2xl mt-5">
            <fieldset class="fieldset bg-base-200 border-base-300 border rounded-box p-4">
  <legend class="fieldset-legend"></legend>

  <label class="label font-bold">Username</label>
  <input type="email" id="username" class="input w-full" placeholder="Enter Username" />

  <label class="label font-bold">Password</label>
  <input type="password" id="password" class="input w-full" placeholder="Enter Password" />

  <button id="login-btn" class="btn btn-primary mt-4">Sign in</button>
</fieldset>
        </div>

         <div class="text-center mb-4">
                <p class="text-[#64748B] mb-4 mt-5">Demo Credentials:</p>
                <p class="text-[#1F2937]"><span class="font-bold mb-2">Username:</span> admin</p>
                <p class="text-[#1F2937]"><span class="font-bold">Password:</span> admin123</p>
            </div>

       <script src="./login.js"></script>  
</body>
</html>

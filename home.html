<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="stylesheet" href="home.css">
</head>
<body>
    <header class="bg-white">
        <section class="w-11/12 mx-auto py-3 flex justify-between">
            <div class="flex gap-1 items-center">
            <img class="w-[30px]" src="./assets/github-logo.png">
            <h2 class="font-bold">GitHub Issues Tracker</h2>
            </div>

            <div>
                <div class="join">
  <div >
    <label class="input validator join-item">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2"
      fill="none"
      stroke="currentColor"
    >
       <circle cx="11" cy="11" r="7"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </g>
  </svg>
      <input id="searchInput"type="email" placeholder="Search Issues..." required />
    </label>
    <div class="validator-hint hidden">Enter Issues</div>
  </div>
  <button class="btn btn-primary join-item">+ New Issues</button>
</div>
            </div>
            </section>

    </header>

    <main class="w-9/12 mx-auto bg-gray-100">
        <section class="sticky top-32 md:top-20 my-6 bg-white p-3 rounded-2xl shadow">
  <div class="flex gap-2 justify-start">
    <button id="allbtn" class="btn btn-primary px-6 md:px-10">All</button>
    <button id="openbtn" class="btn px-6 md:px-10">Open</button>
    <button id="closebtn" class="btn px-6 md:px-10">Closed</button>
  </div>
</section>

        <section id="container" class="mt-4 bg-white rounded-2xl shadow-md">
            <div class="flex justify-between items-center">
            <div class="flex items-center gap-2 p-5">
            <div>
                <img class="bg-[#ece4ff] p-2 rounded-[50%] ml-5" src="./assets/Aperture.png">
            </div>
            <div>
                <h3 class="font-semibold text-2xl"><span id="count">0</span> Issues</h3>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
            </div>
            <div>
                <img class="mr-5" src="./assets/Frame 2087325656.png">
            </div>
            </div>
        </section>

        <div id="spiner" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-dots loading-xl"></span>
        </div>
        <!-- <section class="mt-10 w-9/12 mx-auto bg-white rounded-2xl">
        
        </section> -->
        <section id="card-section" class="my-5 grid gap-4 grid-cols-1 sm:grid-cols-3 lg:grid-cols-4">

        </section>

    </main>
    <script src="./script.js"></script>
</body>
</html>

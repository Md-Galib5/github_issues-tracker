<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" href="home.css">
</head>
<body>
   <header class="bg-white">
  <section class="w-11/12 mx-auto py-3 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
    <div class="flex gap-1 items-center">
      <img class="w-[30px]" src="./assets/github-logo.png">
      <h2 class="font-bold">GitHub Issues Tracker</h2>
    </div>

    <div class="join w-full md:w-auto">
      <label class="input validator join-item w-full md:w-auto">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </g>
        </svg>
        <input id="searchInput" type="text" placeholder="Search Issues..." />
      </label>

      <button class="btn btn-primary join-item">+ New Issues</button>
    </div>

  </section>
</header>

    <main class="w-11/12 md:w-9/12 mx-auto bg-gray-100">
        <section class="top-32 md:top-10 my-6 bg-white p-3 rounded-2xl shadow">
  <div class="flex gap-2 justify-start">
    <button id="allbtn" class="btn btn-primary px-6 md:px-10">All</button>
    <button id="openbtn" class="btn px-6 md:px-10">Open</button>
    <button id="closebtn" class="btn px-4 md:px-10">Closed</button>
  </div>
</section>

       <section class="mt-4 bg-white rounded-2xl shadow-md">
  <div class="flex flex-col md:flex-row md:justify-between md:items-center">

    <!-- Left Side -->
    <div class="flex items-center gap-3 p-5">
      <img class="bg-[#ece4ff] p-2 rounded-full w-10 h-10" src="./assets/Aperture.png">

      <div>
        <h3 class="font-semibold text-xl md:text-2xl">
          <span id="count">0</span> Issues
        </h3>
        <p class="text-[#64748B] text-sm md:text-base">
          Track and manage your project issues
        </p>
      </div>
    </div>
    <div class="px-5 pb-4 md:pb-0 md:pr-5">
      <img src="./assets/Frame 2087325656.png">
    </div>

  </div>
</section>

        <div id="spiner" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-dots loading-xl"></span>
        </div>
        <!-- <section class="mt-10 w-9/12 mx-auto bg-white rounded-2xl">
        
        </section> -->
        <section id="card-section" class="my-5 grid gap-4 grid-cols-1 sm:grid-cols-3 lg:grid-cols-4">

        </section>

        <dialog id="issue-modal" class="modal">
      <div id="modal-element" class="modal-box w-11/12 max-w-4xl">
      </div>
    </dialog>

    </main>
    <script src="./script.js"></script>
</body>
</html>
